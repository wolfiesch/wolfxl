# Module / case status manifest for the differential writer harness.
#
# Updated by each wave's subagent PR. Conftest parameterizes pytest tests
# from this file and applies xfail/xpass markers based on per-layer status.
#
# Status values: "pass", "fail", "xfail", "pending"
# Route values:  "oracle" (rust_xlsxwriter), "native" (wolfxl-writer),
#                "split"  (per-case routing — case bodies decide),
#                "dual"   (both backends run, output diffed)
#
# W4C: every module flipped to "dual" — the harness now drives both
# backends through DualWorkbook on every case and runs the 3-layer diff.
# Layer 2 (structural) and Layer 3 (semantic HARD-tier) are blocking
# gates; Layer 1 (byte-canonical) is gold-star and tracked at runtime
# via pytest user_properties — its per-case status stays "pending"
# in the manifest until a future status CLI surfaces it.
#
# At W4C close: 24 of 25 cases pass L2 + L3 cleanly. The 25th
# (comments_multi_author_insertion_order) is xfail by design; see the
# block-level comment immediately above its entry.

# ----------------------------------------------------------------------
# Wave 1 modules — foundations
# ----------------------------------------------------------------------

[module.model]
route = "dual"
source_paths = [
    "crates/wolfxl-writer/src/model/cell.rs",
    "crates/wolfxl-writer/src/model/workbook.rs",
    "crates/wolfxl-writer/src/model/worksheet.rs",
    "crates/wolfxl-writer/src/model/format.rs",
    "crates/wolfxl-writer/src/model/date.rs",
]

[module.refs]
route = "dual"
source_paths = ["crates/wolfxl-writer/src/refs.rs"]

[module.zip_container]
route = "dual"
source_paths = [
    "crates/wolfxl-writer/src/zip.rs",
    "crates/wolfxl-writer/src/emit/content_types.rs",
    "crates/wolfxl-writer/src/emit/rels.rs",
    "crates/wolfxl-writer/src/emit/doc_props.rs",
]

