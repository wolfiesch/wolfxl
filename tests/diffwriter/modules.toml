# comments_multi_author_insertion_order is the canonical regression test
# for the rust_xlsxwriter BTreeMap-author bug native fixes. Dual-backend
# parity is fundamentally impossible here — oracle alphabetizes authors,
# native preserves IndexMap insertion order. Native-side correctness is
# verified directly in tests/parity/test_write_parity.py and the Wave 3
# integration test wave3_rich_features_roundtrip; this case is marked
# xfail in test_cases.py via _ORACLE_BUGS_DOCUMENTED.
[[module.comments.cases]]
id = "comments_multi_author_insertion_order"
layer1_status = "pending"
layer2_status = "xfail"
layer3_status = "xfail"

