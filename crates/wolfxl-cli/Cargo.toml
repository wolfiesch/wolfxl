[package]
name = "wolfxl-cli"
version = "0.4.0"
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "Command-line tool for fast, agent-friendly Excel previews. Installs the `wolfxl` binary."

[[bin]]
name = "wolfxl"
path = "src/main.rs"

[dependencies]
wolfxl-core = { path = "../wolfxl-core" }
clap = { version = "4", features = ["derive"] }
anyhow.workspace = true
serde_json.workspace = true
unicode-width = "0.2"

[dev-dependencies]
assert_cmd = "2"
predicates = "3"
